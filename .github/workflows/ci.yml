name: 🧪 Intelligent Bistro — CI/CD Test Pipeline

on:
  push:
    branches: [main, develop, "feature/**", "fix/**"]
  pull_request:
    branches: [main, develop]
  workflow_dispatch: # Allow manual runs

# Cancel in-progress runs on new pushes to same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9"

jobs:
  # ── Job 1: Type checking ─────────────────────────────────────────────────
  typecheck:
    name: 🔷 TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install frontend deps
        run: npm ci

      - name: Install backend deps
        run: npm ci
        working-directory: backend

      - name: TypeCheck frontend
        run: npx tsc --noEmit

      - name: TypeCheck backend
        run: npx tsc --noEmit
        working-directory: backend

  # ── Job 2: Lint ──────────────────────────────────────────────────────────
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # ── Job 3: Frontend unit tests ────────────────────────────────────────────
  unit-tests:
    name: 🧩 Unit Tests
    runs-on: ubuntu-latest
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit -- --reporter=verbose --reporter=json --outputFile=test-results/unit.json
        env:
          CI: true

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: test-results/unit.json

  # ── Job 4: Frontend integration tests ────────────────────────────────────
  integration-tests:
    name: 🔗 Integration Tests
    runs-on: ubuntu-latest
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Run integration tests
        run: npm run test:integration -- --reporter=verbose
        env:
          CI: true
          EXPO_PUBLIC_API_URL: "http://localhost:3000"

  # ── Job 5: Snapshot tests ─────────────────────────────────────────────────
  snapshot-tests:
    name: 📸 Snapshot Tests
    runs-on: ubuntu-latest
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Run snapshot tests
        run: npm run test:snapshots -- --reporter=verbose
        env:
          CI: true

  # ── Job 6: Coverage report ────────────────────────────────────────────────
  coverage:
    name: 📊 Coverage
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Run full test suite with coverage
        run: npm run test:coverage
        env:
          CI: true
          EXPO_PUBLIC_API_URL: "http://localhost:3000"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

      - name: Coverage summary comment (PRs only)
        if: github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          json-summary-path: coverage/coverage-summary.json
          json-summary-compare-path: coverage/coverage-summary.json

  # ── Job 7: Backend tests ─────────────────────────────────────────────────
  backend-tests:
    name: ⚙️ Backend Tests
    runs-on: ubuntu-latest
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install backend deps
        run: npm ci
        working-directory: backend

      - name: Run backend tests with coverage
        run: npm run test:coverage
        working-directory: backend
        env:
          CI: true
          GEMINI_API_KEY: "test-key-for-ci" # Mocked in tests

      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/

  # ── Job 8: Performance tests ──────────────────────────────────────────────
  performance-tests:
    name: ⚡ Performance Tests
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Run performance tests
        run: npm run test:perf -- --reporter=verbose
        env:
          CI: true

  # ── Job 9: Flaky test detector ────────────────────────────────────────────
  flaky-detection:
    name: 🎲 Flaky Test Detection
    runs-on: ubuntu-latest
    # Only run on main branch or schedule
    if: github.ref == 'refs/heads/main'
    needs: [unit-tests, integration-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Run tests 3 times to detect flakiness
        run: |
          for i in 1 2 3; do
            echo "=== Run $i ==="
            npm run test:unit -- --reporter=json --outputFile=test-results/run-$i.json
          done
        env:
          CI: true

      - name: Upload flaky detection results
        uses: actions/upload-artifact@v4
        with:
          name: flaky-detection-results
          path: test-results/

  # ── Summary gate ──────────────────────────────────────────────────────────
  ci-pass:
    name: ✅ CI Gate
    runs-on: ubuntu-latest
    needs:
      - typecheck
      - lint
      - unit-tests
      - integration-tests
      - snapshot-tests
      - backend-tests
      - coverage
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.typecheck.result }}" != "success" ]]; then
            echo "❌ TypeCheck failed"
            exit 1
          fi
          if [[ "${{ needs.lint.result }}" != "success" ]]; then
            echo "❌ Lint failed"
            exit 1
          fi
          if [[ "${{ needs.unit-tests.result }}" != "success" ]]; then
            echo "❌ Unit tests failed"
            exit 1
          fi
          if [[ "${{ needs.integration-tests.result }}" != "success" ]]; then
            echo "❌ Integration tests failed"
            exit 1
          fi
          if [[ "${{ needs.snapshot-tests.result }}" != "success" ]]; then
            echo "❌ Snapshot tests failed"
            exit 1
          fi
          if [[ "${{ needs.backend-tests.result }}" != "success" ]]; then
            echo "❌ Backend tests failed"
            exit 1
          fi
          if [[ "${{ needs.coverage.result }}" != "success" ]]; then
            echo "❌ Coverage thresholds not met"
            exit 1
          fi
          echo "✅ All CI checks passed"
